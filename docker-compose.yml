services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://jd.texmg.com}
    env_file:
      - ./env/app.env
    depends_on:
      - db
    volumes:
      - ${CLAIM_RECORDS_HOST_DIR:-./data/claim-records}:/app/data/claim-records
    restart: unless-stopped
    expose:
      - "3000"

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-johndeere_warranty}
      POSTGRES_USER: ${POSTGRES_USER:-johndeere_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_HOST_DIR:-./data/postgres}:/var/lib/postgresql
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
